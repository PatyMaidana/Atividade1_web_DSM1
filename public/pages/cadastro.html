<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSM | Home</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <main class="card">
      <div class="logos">
        <img
          class="logo-dsm"
          src="/assets/img/logo_dsm_transparente.png"
          alt="Logo DSM"
        />
        <img
          class="logo-fatec"
          src="/assets/img/logo_fatec_transparente.png"
          alt="Logo Fatec"
        />
        <img
          class="logo-cps"
          src="/assets/img/logo_cps_transparente.png"
          alt="Logo CPS"
        />
      </div>
      <div>
        <div>
          <h1 class="title">Cadastro</h1>
        </div>
        <div class="cadastro-conteiner">
          <div>
            <label for="nome">Nome:</label>
            <input id="nome" placeholder="Nome Completo" />
          </div>
          <div>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Idade" min="17" />
          </div>
          <div>
            <label for="endereco">Endereço:</label>
            <input id="endereco" placeholder="Endereço Completo" />
          </div>
          <div>
            <label for="cidade">Cidade:</label>
            <input id="cidade" placeholder="Cidade" />
          </div>
          <div>
            <label for="estados">Estados:</label>
            <select id="estados" size="1">
              <option selected>SP</option>
              <option>RJ</option>
              <option>MG</option>
              <option>BA</option>
              <option>AM</option>
              <option>DF</option>
              <option>ES</option>
              <option>GO</option>
              <option>MA</option>
              <option>MT</option>
              <option>MS</option>
              <option>PA</option>
              <option>PB</option>
              <option>PE</option>
              <option>PI</option>
              <option>PR</option>
              <option>RN</option>
              <option>RO</option>
              <option>RR</option>
              <option>RS</option>
              <option>SC</option>
              <option>SE</option>
              <option>TO</option>
              <option>CE</option>
              <option>AC</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <a class="btn-link" href="/enviarcadastro"> Enviar </a>
        </div>
      </div>
    </main>
  </body>
</html>
