<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSM | Home</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <main class="card">
      <div class="logos">
        <img
          class="logo-dsm"
          src="/assets/img/logo_dsm_transparente.png"
          alt="Logo DSM"
        />
        <img
          class="logo-fatec"
          src="/assets/img/logo_fatec_transparente.png"
          alt="Logo Fatec"
        />
        <img
          class="logo-cps"
          src="/assets/img/logo_cps_transparente.png"
          alt="Logo CPS"
        />
      </div>
      <div class="container-login">
        <h1 class="title">Efetue seu login</h1>

        <div class="forms">
          <label for="nomeDeUsuario">Nome de Usuário:</label>
          <input id="nomeDeUsuario" placeholder="Usuário" />
        </div>
        <div class="forms">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" placeholder="Senha" />
        </div>
        <div class="actions2">
          <a class="btn-link" href="/efetuarLogin"> Entrar </a>
        </div>
      </div>
    </main>
  </body>
</html>
